name: Publish Release
description: Create GitHub release and update Homebrew formulas

inputs:
  tag:
    description: "Git tag (e.g. v0.2.0)"
    required: true
  version:
    description: "Version string (e.g. 0.2.0)"
    required: true

runs:
  using: composite
  steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Compute SHA256 checksums
      shell: bash
      run: |
        cd artifacts
        sha256sum *.tar.gz | tee sha256sums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        generate_release_notes: true
        files: |
          artifacts/*.tar.gz
          artifacts/sha256sums.txt

    - name: Update Homebrew formulas
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        TAG="${{ inputs.tag }}"
        BASE_URL="https://github.com/lucaarchidiacono/silt/releases/download/${TAG}"

        MACOS_ARM64_SHA=$(grep 'silt-macos-arm64.tar.gz' artifacts/sha256sums.txt | awk '{print $1}')
        MACOS_X64_SHA=$(grep 'silt-macos-x64.tar.gz' artifacts/sha256sums.txt | awk '{print $1}')
        LINUX_X64_SHA=$(grep 'silt-linux-x64.tar.gz' artifacts/sha256sums.txt | awk '{print $1}')

        cat > Formula/silt-tui.rb << FORMULA
        class SiltTui < Formula
          desc "Local-first, write-only log app — terminal UI"
          homepage "https://github.com/lucaarchidiacono/silt"
          version "${VERSION}"
          license "MIT"

          on_macos do
            if Hardware::CPU.arm?
              url "${BASE_URL}/silt-macos-arm64.tar.gz"
              sha256 "${MACOS_ARM64_SHA}"
            else
              url "${BASE_URL}/silt-macos-x64.tar.gz"
              sha256 "${MACOS_X64_SHA}"
            end
          end

          on_linux do
            if Hardware::CPU.intel?
              url "${BASE_URL}/silt-linux-x64.tar.gz"
              sha256 "${LINUX_X64_SHA}"
            end
          end

          def install
            bin.install "silt-tui"
          end

          test do
            assert_predicate bin/"silt-tui", :executable?
          end
        end
        FORMULA

        cat > Formula/silt-cli.rb << FORMULA
        class SiltCli < Formula
          desc "Local-first, write-only log app — CLI"
          homepage "https://github.com/lucaarchidiacono/silt"
          version "${VERSION}"
          license "MIT"

          on_macos do
            if Hardware::CPU.arm?
              url "${BASE_URL}/silt-macos-arm64.tar.gz"
              sha256 "${MACOS_ARM64_SHA}"
            else
              url "${BASE_URL}/silt-macos-x64.tar.gz"
              sha256 "${MACOS_X64_SHA}"
            end
          end

          on_linux do
            if Hardware::CPU.intel?
              url "${BASE_URL}/silt-linux-x64.tar.gz"
              sha256 "${LINUX_X64_SHA}"
            end
          end

          def install
            bin.install "silt-cli"
          end

          test do
            output = shell_output("#{bin}/silt-cli help 2>&1", 1)
            assert_match "usage:", output
          end
        end
        FORMULA

    - name: Commit formula update
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase origin main
        git add Formula/
        git diff --cached --quiet && echo "No formula changes" && exit 0
        git commit -m "update Homebrew formulas to ${{ inputs.tag }}"
        git push origin main
